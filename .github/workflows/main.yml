# 🌾 FasoAgro-Express - Base de Données E30

Ce dépôt contient l'automatisation de la base de données et les scripts associés pour l'application **FasoAgro-Express**.

---

## 📌 Contenu du projet

* **`Code_v2.gs`** : Script Google Apps Script gérant l'initialisation du classeur Google Sheets, les règles de validation, le formatage automatique ainsi que l'API Web App (`doGet` et `doPost`).
* **Services Web** : API REST pour la récupération des rapports de réunions et l'enregistrement de nouveaux rapports.

---

## 🚀 Fonctionnalités Google Sheets

1. **Onglet Utilisateurs** : Structure et en-tête personnalisés.
2. **Onglet Membres** : Liste des membres du groupe et formatage automatique.
3. **Onglet Rapport de Réunion** :
   * Génération automatique des identifiants (`R-2026-XXX`).
   * Menu déroulant pour les statuts (*Non commencé*, *En cours*, *Terminé*, *En retard*).
   * Formatage automatique des dates.

---

## 📱 Application Mobile (APK)

La Web App est conçue pour être intégrée dans une interface Android en `WebView` afin d'être utilisée directement sur smartphone.
